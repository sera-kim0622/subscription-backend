services:
  subscription-db:
    image: postgres:15
    container_name: subscription-db
    restart: always
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  subscription-app:
    image: serakim0622/subscription-backend:latest
    container_name: subscription
    restart: always
    env_file:
      - .env
    depends_on:
      - subscription-db
    networks:
      - app-network

  frontend:
    image: serakim0622/subscription-frontend:latest
    container_name: subscription-frontend
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: subscription-nginx
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - subscription-app
      - frontend
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
