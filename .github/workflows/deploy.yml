name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t serakim0622/subscription-backend:latest .

      - name: Push Docker Image
        run: docker push serakim0622/subscription-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/subscription-back

            echo "📥Sync latest repository..."
            git fetch origin main
            git reset --hard origin/main

            echo "🐳 Pull latest image..."
            docker pull serakim0622/subscription-backend:latest

            echo "🔄 Restart containers..."
            docker compose down
            docker compose up -d

            echo "✅ Deployment complete!"
